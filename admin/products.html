<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Products | Ceylon Lumidora Gems</title>

    <!-- Icons & Fonts -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Main Theme -->
    <link rel="stylesheet" href="../user/css/styles.css" />

    <style>
      body {
        padding-top: 0;
      }

      .admin-wrapper {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 260px;
        background: var(--primary);
        color: white;
        padding: 30px 20px;
        position: fixed;
        height: 100vh;
      }

      .sidebar h3 {
        color: var(--accent);
        margin-bottom: 40px;
        text-align: center;
      }

      .sidebar a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 15px;
        border-radius: var(--radius);
        margin-bottom: 12px;
        transition: var(--transition);
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: var(--accent);
        color: var(--primary);
      }

      .main-content {
        margin-left: 260px;
        padding: 40px;
        flex: 1;
      }

      .product-img-preview {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: var(--radius);
        margin-top: 10px;
      }

      /* ===== Product Modal Styling (Matches Lumidora Theme) ===== */

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        justify-content: center;
        align-items: center;
        z-index: 999;
      }

      .modal-content {
        background: white;
        width: 450px;
        padding: 30px;
        border-radius: var(--radius);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        animation: fadeIn 0.25s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .close-modal {
        float: right;
        font-size: 20px;
        cursor: pointer;
        color: #999;
      }

      .close-modal:hover {
        color: var(--accent);
      }

      /* ===== Form Styling ===== */

      .form-group {
        margin-bottom: 18px;
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        font-weight: 500;
        margin-bottom: 6px;
      }

      .form-group input,
      .form-group select {
        padding: 10px 12px;
        border-radius: var(--radius);
        border: 1px solid #ddd;
        font-size: 14px;
        transition: var(--transition);
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.15); /* soft gold glow */
      }

      /* ===== File Upload Styling ===== */

      input[type="file"] {
        background: #f9f9f9;
        border: 1px dashed #ccc;
        cursor: pointer;
      }

      input[type="file"]:hover {
        border-color: var(--accent);
      }

      /* ===== Image Preview ===== */

      .product-img-preview {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: var(--radius);
        margin-top: 10px;
        border: 1px solid #eee;
        background: #f5f5f5;
      }

      /* ===== Save Button Override ===== */

      .modal-content .btn {
        background: var(--accent);
        color: var(--primary);
        border-radius: var(--radius);
        transition: var(--transition);
      }

      .modal-content .btn:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }
    </style>
  </head>

  <body>
    <div class="admin-wrapper">
      <!-- Sidebar -->
      <div class="sidebar">
        <h3>Lumidora Admin</h3>

        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html" class="active"><i class="fas fa-gem"></i> Products</a>
        <a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a>
        <a href="customers.html"><i class="fas fa-users"></i> Customers</a>
        <a href="shipping.html"><i class="fas fa-truck"></i> Shipping </a>
        <a href="analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>

        <hr style="border-color: rgba(255, 255, 255, 0.2)" />
        <a href="../user/index.html"
          ><i class="fas fa-sign-out-alt"></i> Logout</a
        >
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2>Products Management</h2>
          <button class="btn" id="add-product-btn">
            <i class="fas fa-plus"></i> Add Product
          </button>
        </div>

        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="products-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ================= PRODUCT MODAL ================= -->
    <div class="modal" id="product-modal">
      <div class="modal-content">
        <span class="close-modal" id="close-product-modal">&times;</span>
        <h3 id="modal-title">Add Product</h3>

        <form id="product-form">
          <input type="hidden" id="product-id" />

          <!-- Gem Name -->
          <div class="form-group">
            <label>Gem Name</label>
            <input type="text" id="product-name" required />
          </div>

          <!-- Price + Category (Side by Side) -->
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Price (USD)</label>
                <input type="number" id="product-price" required />
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label>Gem Category</label>
                <select id="product-category" required>
                  <option value="">Select</option>
                  <option value="Sapphire">Sapphire</option>
                  <option value="Ruby">Ruby</option>
                  <option value="Emerald">Emerald</option>
                  <option value="Topaz">Topaz</option>
                  <option value="Amethyst">Amethyst</option>
                  <option value="Diamond">Diamond</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Upload + URL (Side by Side) -->
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Upload From Device</label>
                <input type="file" id="product-image-file" accept="image/*" />
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label>Image URL</label>
                <input
                  type="text"
                  id="product-image-url"
                  placeholder="https://example.com/image.jpg"
                />
              </div>
            </div>
          </div>

          <!-- Image Preview -->
          <div class="form-group">
            <label>Image Preview</label>
            <img id="image-preview" class="product-img-preview" />
          </div>

          <!-- Save Button -->
          <button type="submit" class="btn w-100">Save Product</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      /* ================= STATE ================= */

      let products = JSON.parse(localStorage.getItem("adminProducts")) || [];
      let editingProductId = null;

      /* ================= NOTIFICATION ================= */

      function showNotification(message) {
        const notification = document.createElement("div");
        notification.className = "notification";
        notification.textContent = message;

        document.body.appendChild(notification);

        setTimeout(() => {
          notification.style.animation = "slideOut 0.3s ease forwards";
          setTimeout(() => notification.remove(), 300);
        }, 2000);
      }

      /* ================= RENDER ================= */

      function renderProducts() {
        const tbody = document.getElementById("products-table-body");
        tbody.innerHTML = "";

        if (products.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4">No products available</td></tr>`;
          return;
        }

        products.forEach((product) => {
          const row = document.createElement("tr");

          row.innerHTML = `
      <td>
        <img src="${product.image}" 
          style="width:80px;height:80px;object-fit:cover;border-radius:var(--radius);">
      </td>
      <td>${product.name}</td>
      <td>$${product.price.toLocaleString()}</td>
      <td>
        <button class="btn btn-outline" onclick="editProduct(${product.id})">
          Edit
        </button>
        <button class="btn" onclick="deleteProduct(${product.id})">
          Delete
        </button>
      </td>
    `;

          tbody.appendChild(row);
        });
      }

      /* ================= ADD / EDIT ================= */

      document
        .getElementById("add-product-btn")
        .addEventListener("click", () => {
          editingProductId = null;
          document.getElementById("modal-title").textContent = "Add Product";
          document.getElementById("product-form").reset();
          document.getElementById("product-modal").style.display = "flex";
        });

      document
        .getElementById("close-product-modal")
        .addEventListener("click", () => {
          document.getElementById("product-modal").style.display = "none";
        });

      window.addEventListener("click", (e) => {
        const modal = document.getElementById("product-modal");
        if (e.target === modal) modal.style.display = "none";
      });

      document
        .getElementById("product-form")
        .addEventListener("submit", (e) => {
          e.preventDefault();

          const name = document.getElementById("product-name").value;
          const price = parseFloat(
            document.getElementById("product-price").value,
          );
          const image = selectedImageData || "";

          if (editingProductId) {
            const product = products.find((p) => p.id === editingProductId);
            product.name = name;
            product.price = price;
            product.image = image;

            showNotification(`${name} updated successfully!`);
          } else {
            const newProduct = {
              id: Date.now(),
              name,
              price,
              image,
            };

            products.push(newProduct);
            showNotification(`${name} added successfully!`);
          }

          localStorage.setItem("adminProducts", JSON.stringify(products));
          renderProducts();
          document.getElementById("product-modal").style.display = "none";
        });

      function editProduct(id) {
        const product = products.find((p) => p.id === id);
        if (!product) return;

        editingProductId = id;

        document.getElementById("modal-title").textContent = "Edit Product";
        document.getElementById("product-name").value = product.name;
        document.getElementById("product-price").value = product.price;
        selectedImageData = product.image;
        document.getElementById("image-preview").src = product.image;
        document.getElementById("product-image-url").value = product.image;
        document.getElementById("image-preview").src = product.image;

        document.getElementById("product-modal").style.display = "flex";
      }

      function deleteProduct(id) {
        const product = products.find((p) => p.id === id);
        products = products.filter((p) => p.id !== id);

        localStorage.setItem("adminProducts", JSON.stringify(products));
        renderProducts();

        showNotification(`${product.name} removed successfully!`);
      }

      /* ================= IMAGE PREVIEW ================= */

      let selectedImageData = "";

      /* ===== File Upload Preview ===== */
      document
        .getElementById("product-image-file")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = function (event) {
            selectedImageData = event.target.result;
            document.getElementById("image-preview").src = selectedImageData;
          };
          reader.readAsDataURL(file);
        });

      /* ===== URL Preview ===== */
      document
        .getElementById("product-image-url")
        .addEventListener("input", function (e) {
          const url = e.target.value.trim();
          if (url !== "") {
            selectedImageData = url;
            document.getElementById("image-preview").src = url;
          }
        });

      /* ================= INIT ================= */

      renderProducts();
    </script>
  </body>
</html>
