<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Analytics | Lumidora Admin</title>
  <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet"/>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

  <link rel="stylesheet" href="../user/css/styles.css" />

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { padding-top: 0; }

    .admin-wrapper { display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px;
      background: var(--primary);
      color: white;
      padding: 30px 20px;
      position: fixed;
      height: 100vh;
    }

    .sidebar h3 {
      color: var(--accent);
      margin-bottom: 40px;
      text-align: center;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: var(--radius);
      margin-bottom: 12px;
      transition: var(--transition);
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: var(--accent);
      color: var(--primary);
    }

    .main-content {
      margin-left: 260px;
      padding: 40px;
      flex: 1;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .stat-card h4 {
      margin-bottom: 10px;
      font-weight: 500;
      color: #666;
    }

    .stat-card h2 {
      color: var(--accent);
      font-size: 28px;
    }

    .chart-container {
      background: white;
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>

<div class="admin-wrapper">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Lumidora Admin</h3>
      <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="products.html"><i class="fas fa-gem"></i> Products</a>
      <a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a>
      <a href="customers.html"><i class="fas fa-users"></i> Customers</a>
      <a href="shipping.html"><i class="fas fa-truck"></i> Shipping </a>
      <a href="analytics.html" class="active"><i class="fas fa-chart-pie"></i> Analytics</a>
      <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>

      <hr style="border-color: rgba(255, 255, 255, 0.2)" />

      <a href="../user/index.html">
        <i class="fas fa-sign-out-alt"></i> Logout
      </a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h2>Analytics Overview</h2>
    <br>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <h4>Total Revenue</h4>
        <h2 id="total-revenue">$0</h2>
      </div>

      <div class="stat-card">
        <h4>Total Orders</h4>
        <h2 id="total-orders">0</h2>
      </div>

      <div class="stat-card">
        <h4>Total Customers</h4>
        <h2 id="total-customers">0</h2>
      </div>

      <div class="stat-card">
        <h4>Shipped Orders</h4>
        <h2 id="shipped-orders">0</h2>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <canvas id="revenueChart"></canvas>
    </div>

  </div>

</div>

<script>

const orders = JSON.parse(localStorage.getItem("orders")) || [];

/* ===== Calculate Stats ===== */

let totalRevenue = 0;
let shippedCount = 0;
const customerSet = new Set();

orders.forEach(order => {
  totalRevenue += order.total;
  customerSet.add(order.customer || "Guest");

  if (order.status === "Shipped" || order.status === "Delivered") {
    shippedCount++;
  }
});

document.getElementById("total-revenue").textContent = "$" + totalRevenue.toFixed(2);
document.getElementById("total-orders").textContent = orders.length;
document.getElementById("total-customers").textContent = customerSet.size;
document.getElementById("shipped-orders").textContent = shippedCount;

/* ===== Revenue By Month ===== */

const monthlyRevenue = {};

orders.forEach(order => {
  const date = new Date(order.date);
  const month = date.toLocaleString("default", { month: "short" });

  if (!monthlyRevenue[month]) {
    monthlyRevenue[month] = 0;
  }

  monthlyRevenue[month] += order.total;
});

const labels = Object.keys(monthlyRevenue);
const data = Object.values(monthlyRevenue);

/* ===== Chart ===== */

new Chart(document.getElementById("revenueChart"), {
  type: "bar",
  data: {
    labels: labels,
    datasets: [{
      label: "Revenue by Month (USD)",
      data: data,
      backgroundColor: "#d4af37"
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: {
        display: true
      }
    }
  }
});

</script>

</body>
</html>
